<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Antooo Music</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h2>🎧 Antooo</h2>
    <nav>
      <a href="#">Home</a>
      <a href="#">Search</a>
      <a href="#">Library</a>
    </nav>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <header class="topbar">
      <input type="text" id="search" placeholder="Cari lagu...">
    </header>

    <div id="musicList" class="music-grid"></div>
  </main>

</div>

<!-- PLAYER -->
<div class="player">
  <div class="left">
    <div class="cover" id="cover"></div>
    <div>
      <div id="nowPlaying">Pilih lagu...</div>

      <!-- equalizer -->
      <div class="equalizer" id="eq">
        <span></span><span></span><span></span><span></span>
      </div>
    </div>
  </div>

  <div class="center">
    <div class="controls">
      <button onclick="prev()">⏮</button>
      <button onclick="togglePlay()" id="playBtn">▶</button>
      <button onclick="next()">⏭</button>
    </div>

    <div class="progress-container" onclick="seek(event)">
      <div class="progress" id="progress"></div>
    </div>
  </div>

  <audio id="audioPlayer"></audio>
</div>

<script src="script.js"></script>
</body>
</html>
