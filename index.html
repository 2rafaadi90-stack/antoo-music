<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Antooo Music</title>
<link rel="stylesheet" href="style.css?v=1">
</head>
<body>

<!-- BACKGROUND KARAKTER -->
<div class="bg-character"></div>

<header>
  <h1>🎧 Antooo Music</h1>
  <input type="text" id="search" placeholder="Cari lagu...">
</header>

<section>
  <div id="musicList" class="music-list"></div>
</section>

<!-- PLAYER -->
<div class="player">
  <div id="nowPlaying">Pilih lagu...</div>

  <div class="controls">
    <button onclick="prev()">⏮</button>
    <button onclick="togglePlay()" id="playBtn">▶</button>
    <button onclick="next()">⏭</button>
  </div>

  <div class="progress-container" onclick="seek(event)">
    <div class="progress" id="progress"></div>
  </div>

  <audio id="audioPlayer"></audio>
</div>

<script src="script.js?v=1"></script>
</body>
</html>
