<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Antooo Music</title>
<link rel="stylesheet" href="style.css?v=30">
</head>
<body>

<header>
  <h1>Antooo Music</h1>
  <p class="tagline">SEVRAN Ai Web Music Antooo</p>
  <input type="text" id="search" placeholder="Cari lagu...">
</header>

<section>
  <h2>🎧 Playlist</h2>
  <div id="musicList" class="music-list"></div>
</section>

<!-- PLAYER -->
<div class="player">
  <div id="nowPlaying">Pilih lagu...</div>

  <div class="controls">
    <button onclick="prev()">⏮</button>
    <button onclick="togglePlay()" id="playBtn">▶</button>
    <button onclick="next()">⏭</button>
    <button onclick="toggleShuffle()">🔀</button>
    <button onclick="toggleRepeat()">🔁</button>
  </div>

  <div class="progress-container" onclick="seek(event)">
    <div class="progress" id="progress"></div>
  </div>

  <div class="time">
    <span id="currentTime">0:00</span>
    <span id="duration">0:00</span>
  </div>

  <input type="range" min="0" max="1" step="0.01" id="volume">
  <audio id="audioPlayer"></audio>
</div>

<script src="script.js?v=30"></script>
</body>
</html>
