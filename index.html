<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Antooo Music</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topbar">
  <h2>Antooo Music</h2>
  <input type="text" id="search" placeholder="Cari lagu...">
</header>

<main id="musicList" class="list"></main>

<!-- PLAYER -->
<div class="player">
  <button onclick="togglePlay()" id="playBtn">▶</button>
  <div class="info">
    <span id="nowPlaying">Pilih lagu...</span>
    <div class="wave" id="wave"></div>
  </div>
</div>

<audio id="audioPlayer"></audio>

<script src="script.js"></script>
</body>
</html>
